<!DOCTYPE html>

<head>

<title>4D天性测评</title>
<style>
:root{
  --green:#2d9d5d;--green-bg:#e8f5ee;
  --yellow:#c99500;--yellow-bg:#faf3d9;
  --blue:#2563eb;--blue-bg:#e8effd;
  --orange:#d96e1e;--orange-bg:#fdede0;
  --ink:#2d2a33;--ink2:#5e5a66;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(180deg,#e8e0f0 0%,#f3e6ea 25%,#f5f0e8 50%,#eef3ec 75%,#e8ecee 100%);
  background-attachment:fixed;color:var(--ink);line-height:1.8;min-height:100vh;
}
.container{max-width:680px;margin:0 auto;padding:32px 20px 80px;position:relative}

/* Floating background */
.deco-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.deco{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(180,160,200,0.25) 0%,transparent 70%);animation:drift 20s ease-in-out infinite}
.deco:nth-child(1){width:300px;height:300px;top:-80px;left:-60px}
.deco:nth-child(2){width:220px;height:220px;top:20%;right:-40px;animation-delay:-5s;background:radial-gradient(circle,rgba(220,180,160,0.2) 0%,transparent 70%)}
.deco:nth-child(3){width:180px;height:180px;bottom:10%;left:10%;animation-delay:-10s;background:radial-gradient(circle,rgba(160,190,180,0.2) 0%,transparent 70%)}
.deco:nth-child(4){width:260px;height:260px;bottom:-60px;right:20%;animation-delay:-15s;background:radial-gradient(circle,rgba(180,170,200,0.18) 0%,transparent 70%)}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-30px) scale(1.05)}66%{transform:translate(-15px,20px) scale(0.95)}}

/* Header */
.header{position:relative;z-index:1;text-align:center;padding:48px 16px 40px}
.header h1{font-size:32px;font-weight:600;margin-bottom:10px;letter-spacing:.04em;color:var(--ink)}
.header .subtitle{font-size:13px;color:var(--ink2);letter-spacing:.1em;margin-bottom:28px}
.header-intro{background:rgba(255,255,255,0.55);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.6);border-radius:20px;padding:22px 26px;font-size:14.5px;color:var(--ink2);line-height:1.95;box-shadow:0 4px 20px rgba(0,0,0,0.04)}
.header-guide{margin-top:16px;background:rgba(255,255,255,0.4);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.5);border-radius:18px;padding:18px 24px;font-size:14px;color:var(--ink);line-height:1.9;box-shadow:0 2px 12px rgba(0,0,0,0.03)}

/* Progress */
.progress-wrap{position:relative;z-index:1;margin-bottom:28px}
.progress-text{font-size:12px;color:var(--ink2);margin-bottom:8px;text-align:center;letter-spacing:.05em}
.progress-track{height:3px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#a090b8,#8a9ab0);border-radius:3px;transition:width .5s ease}

/* Quiz */
.quiz-stage{position:relative;z-index:1;min-height:300px}
.question-card{background:rgba(255,255,255,0.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.65);border-radius:24px;padding:40px 32px;box-shadow:0 8px 32px rgba(0,0,0,0.06);animation:cardIn .5s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.question-number{font-size:13px;color:var(--ink2);margin-bottom:18px;letter-spacing:.05em}
.question-text{font-size:18px;font-weight:500;margin-bottom:32px;line-height:1.65;color:var(--ink)}
.options{display:flex;flex-direction:column;gap:14px}
.options label{display:flex;align-items:center;gap:14px;padding:20px 22px;border-radius:16px;border:1.5px solid rgba(0,0,0,0.06);background:rgba(255,255,255,0.5);cursor:pointer;font-size:15.5px;color:var(--ink);transition:all .25s ease}
.options label:hover{background:rgba(255,255,255,0.85);border-color:rgba(0,0,0,0.12);transform:translateY(-1px)}
.options input[type=radio]{width:18px;height:18px;accent-color:#7a6a8a;flex-shrink:0}
.options label.selected{background:#fff;border-color:#a090b8;box-shadow:0 2px 12px rgba(160,144,184,0.12)}

.nav-bar{display:flex;justify-content:space-between;margin-top:28px;gap:12px;position:relative;z-index:1}
.nav-btn{padding:14px 28px;border-radius:14px;border:1px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.6);font-size:14px;cursor:pointer;transition:all .25s;color:var(--ink);letter-spacing:.04em}
.nav-btn:hover{background:rgba(255,255,255,0.9)}
.nav-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.nav-btn.primary:hover{opacity:.88}
.nav-btn:disabled{opacity:.25;cursor:not-allowed}

/* Result */
.result{display:none;position:relative;z-index:1}
.result.show{display:block;animation:cardIn .7s ease}
.section-title{font-size:22px;font-weight:600;margin:44px 0 24px;text-align:center;letter-spacing:.04em}

/* Chart */
.chart-wrap{background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.6);border-radius:24px;padding:28px;margin-bottom:32px;box-shadow:0 4px 24px rgba(0,0,0,0.05)}
.chart-svg{width:100%;height:auto;display:block}

/* Main result */
.main-result{background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.6);border-radius:24px;padding:36px 28px;text-align:center;margin-bottom:32px;box-shadow:0 4px 24px rgba(0,0,0,0.05)}
.main-result .label{font-size:12px;color:var(--ink2);letter-spacing:.12em;margin-bottom:14px}
.main-result .color-title{font-size:26px;font-weight:600;margin-bottom:6px;letter-spacing:.03em}
.main-result .color-en{font-size:14px;color:var(--ink2);margin-bottom:18px;letter-spacing:.04em}
.main-result .color-desc{font-size:15px;line-height:1.85;color:var(--ink2);max-width:500px;margin:0 auto}
.portrait-wrap{width:100px;height:100px;margin:0 auto 18px}
.portrait-wrap svg{width:100%;height:100%}

/* AMBR */
.ambr-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px}
.ambr-card{background:rgba(255,255,255,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.55);border-radius:18px;padding:24px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.ambr-card .tag{display:inline-block;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;margin-bottom:12px;letter-spacing:.06em}
.ambr-card p{font-size:14px;color:var(--ink2);line-height:1.8}

/* Detail */
.detail-card{background:rgba(255,255,255,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.55);border-radius:18px;padding:26px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.detail-card h4{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px;letter-spacing:.02em}
.detail-card ul{padding-left:18px;font-size:14px;color:var(--ink2);line-height:2.1}
.detail-card li{margin-bottom:6px}
.detail-card .hl{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:600;margin-right:6px;letter-spacing:.03em}

.retest-btn{display:block;width:100%;padding:16px;margin-top:28px;background:rgba(255,255,255,0.5);border:1.5px solid rgba(0,0,0,0.08);border-radius:16px;font-size:15px;cursor:pointer;transition:all .25s;color:var(--ink);letter-spacing:.04em}
.retest-btn:hover{background:rgba(255,255,255,0.85);border-color:rgba(0,0,0,0.15)}

@media(max-width:520px){
  .ambr-grid{grid-template-columns:1fr}
  .header h1{font-size:26px}
  .question-card{padding:28px 22px}
}
</style>
</head>

function renderQuestion(){
  const q=questions[current];
  document.getElementById('quizStage').innerHTML=`
    <div class="question-card" id="qCard">
      <div class="question-number">第 ${current+1} / 14 题</div>
      <div class="question-text">${q.t}</div>
      <div class="options">
        ${q.a.map((opt,i)=>`
          <label class="${answers[current]===q.v[i]?'selected':''}" onclick="selectOption('${q.v[i]}',this)">
            <input type="radio" name="q" value="${q.v[i]}" ${answers[current]===q.v[i]?'checked':''}>
            ${opt}
          </label>
        `).join('')}
      </div>
    </div>`;
  document.getElementById('progressText').textContent=`第 ${current+1} / 14 题`;
  document.getElementById('progressFill').style.width=((current+1)/14*100)+'%';
  document.getElementById('btnPrev').disabled=current===0;
  const btnNext=document.getElementById('btnNext');
  if(current===13){btnNext.textContent=answers[current]?'查看结果':'下一题';btnNext.disabled=!answers[current];}
  else{btnNext.textContent='下一题';btnNext.disabled=!answers[current];}
}

function selectOption(val,el){
  if(autoTimer)clearTimeout(autoTimer);
  answers[current]=val;
  const labels=document.querySelectorAll('.options label');
  labels.forEach(l=>l.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('btnNext').disabled=false;
  if(current===13)document.getElementById('btnNext').textContent='查看结果';
  autoTimer=setTimeout(()=>{if(current<13){current++;renderQuestion();}},400);
}

function goPrev(){
  if(autoTimer)clearTimeout(autoTimer);
  if(current>0){current--;renderQuestion();}
}

function goNext(){
  if(autoTimer)clearTimeout(autoTimer);
  if(!answers[current])return;
  if(current<13){current++;renderQuestion();}
  else{showResult();}
}

function showResult(){
  document.getElementById('pageHeader').style.display='none';
  document.getElementById('progressWrap').style.display='none';
  document.getElementById('quizStage').style.display='none';
  document.getElementById('navBar').style.display='none';

  let F=0,T=0,N=0,S=0;
  answers.forEach((v,i)=>{if(i<7){if(v==='F')F++;else T++;}else{if(v==='N')N++;else S++;}});
  const g=F+N,y=F+S,b=T+N,o=T+S;
  const scores=[{k:'green',s:g},{k:'yellow',s:y},{k:'blue',s:b},{k:'orange',s:o}];
  scores.sort((a,b)=>b.s-a.s);
  const mainKey=scores[0].k;
  const d=colorData[mainKey];
  const opposite=mainKey==='green'?'orange':mainKey==='yellow'?'blue':mainKey==='blue'?'yellow':'green';

  document.getElementById('result').innerHTML = `
    <div class="question-card" style="text-align:center;max-width:420px;margin:60px auto;">
      <div class="question-text" style="margin-bottom:24px;font-size:18px;">测评完成！请填写您的名字</div>
      <input type="text" id="userNameInput" placeholder="例如：张三" style="width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid rgba(0,0,0,0.1);font-size:15px;margin-bottom:20px;outline:none;">
      <button onclick="confirmName()" class="nav-btn primary" style="width:100%;">确认并查看结果</button>
    </div>
  `;
  document.getElementById('result').classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});

  window._resultData = {F,T,N,S,g,y,b,o,d,opposite,scores,mainKey};
}

function confirmName(){
  const name = document.getElementById('userNameInput').value.trim();
  if(!name){alert('请输入名字');return;}
  window._userName = name;
  renderFullResult();
}

function renderFullResult(){
  const {F,T,N,S,g,y,b,o,d,opposite,scores,mainKey} = window._resultData;
  const name = window._userName || '匿名';

  document.getElementById('result').innerHTML = `
    <h2 class="section-title" style="margin-top:0">你的 4D 天性区域图</h2>
    <div class="chart-wrap"><div id="chartContainer"></div></div>
    <div class="main-result" id="mainResult"></div>
    <h2 class="section-title">AMBR 天性解码</h2>
    <div class="ambr-grid" id="ambrGrid"></div>
    <div id="detailSection"></div>
    <div style="text-align:center;margin-top:24px;">
      <button class="retest-btn" onclick="copyResult()" style="background:#fff;border:1.5px solid #2d9d5d;color:#2d9d5d;">复制测评结果</button>
      <button class="retest-btn" onclick="location.reload()" style="margin-top:12px;">重新测评</button>
    </div>
  `;

  const vb=9;
  document.getElementById('chartContainer').innerHTML=`
    <svg class="chart-svg" viewBox="-${vb} -${vb} ${vb*2} ${vb*2}">
      <rect x="-${vb}" y="-${vb}" width="${vb}" height="${vb}" fill="#e8f5ee" opacity="0.7"/>
      <rect x="0" y="-${vb}" width="${vb}" height="${vb}" fill="#e8effd" opacity="0.7"/>
      <rect x="-${vb}" y="0" width="${vb}" height="${vb}" fill="#faf3d9" opacity="0.7"/>
      <rect x="0" y="0" width="${vb}" height="${vb}" fill="#fdede0" opacity="0.7"/>
      <line x1="0" y1="-${vb}" x2="0" y2="${vb}" stroke="#bbb" stroke-width="0.06" opacity="0.5"/>
      <line x1="-${vb}" y1="0" x2="${vb}" y2="0" stroke="#bbb" stroke-width="0.06" opacity="0.5"/>
      <text x="0" y="-${vb/2}" text-anchor="middle" font-size="0.75" fill="#5e5a66">直觉</text>
      <text x="0" y="${vb/2+0.5}" text-anchor="middle" font-size="0.75" fill="#5e5a66">感觉</text>
      <text x="-${vb/2}" y="0.35" text-anchor="middle" font-size="0.75" fill="#5e5a66">情感</text>
      <text x="${vb/2}" y="0.35" text-anchor="middle" font-size="0.75" fill="#5e5a66">逻辑</text>
      <polygon points="${-F},0 0,${-N} ${T},0 0,${S}" fill="rgba(45,42,51,0.08)" stroke="rgba(45,42,51,0.18)" stroke-width="0.08" stroke-linejoin="round"/>
    </svg>`;

  document.getElementById('mainResult').innerHTML=`
    <div class="portrait-wrap">${portraits[mainKey]}</div>
    <div class="label">${name} 的主导天性色彩</div>
    <div class="color-title" style="color:${d.color}">${d.name} · ${d.type}</div>
    <div class="color-en">${d.en}</div>
    <div class="color-desc">${d.desc}</div>`;

  const ambrLabels={attention:'A · 关注点',mindset:'M · 心态',behavior:'B · 行为',result:'R · 成果'};
  document.getElementById('ambrGrid').innerHTML=Object.entries(d.ambr).map(([k,v])=>`
    <div class="ambr-card"><span class="tag" style="background:${d.bg};color:${d.color}">${ambrLabels[k]}</span><p>${v}</p></div>
  `).join('');

  document.getElementById('detailSection').innerHTML=`
    <div class="detail-card">
      <h4 style="color:${d.color}">${d.name}人格深度画像</h4>
      <ul>
        <li><span class="hl" style="background:${d.bg};color:${d.color}">核心优势</span>${d.strength}</li>
        <li><span class="hl" style="background:${d.bg};color:${d.color}">潜在盲区</span>${d.blind}</li>
        <li><span class="hl" style="background:${d.bg};color:${d.color}">修圆方向</span>${d.grow}</li>
        <li><span class="hl" style="background:${d.bg};color:${d.color}">对角色彩</span>${colorData[opposite].name}（${colorData[opposite].type}）— 这是你能量最弱的维度，刻意练习会带来最大成长。</li>
      </ul>
    </div>
    <div class="detail-card">
      <h4>四种色彩速览</h4>
      <ul>
        <li><strong style="color:${colorData.green.color}">绿色（培养型）：</strong>关注人、价值观、欣赏与感激。</li>
        <li><strong style="color:${colorData.yellow.color}">黄色（包融型）：</strong>关注关系、和谐、归属感。</li>
        <li><strong style="color:${colorData.blue.color}">蓝色（展望型）：</strong>关注愿景、创意、可能性。</li>
        <li><strong style="color:${colorData.orange.color}">橙色（指导型）：</strong>关注流程、执行、确定性。</li>
      </ul>
      <p style="margin-top:14px;color:#888;font-size:13px;line-height:1.7">
        每个人四种颜色都有，得分最高的代表你的「主导天性」。成熟的4D领导者不会只做自己，而是能根据情境调用四种能量。
      </p>
    </div>`;

  // 发送数据
  const submitStatus = document.createElement('div');
  submitStatus.id = 'submitStatus';
  submitStatus.style.cssText = 'text-align:center;margin-top:16px;font-size:13px;color:#888;min-height:20px;';
  submitStatus.textContent = '正在保存结果...';

  const FEISHU_WEBHOOK = 'https://open.feishu.cn/open-apis/bot/v2/hook/d7970ce0-1aab-437b-80f9-c7b7c8ca6aa5';
  const hasCF = CF_API && !CF_API.includes('你的-worker-name');

  function sendFeishu(tag, statusText) {
    var tagText = tag ? ' | ' + tag : '';
    var feishuText = '【4D天性测评结果' + tagText + '】\n' +
      '姓名：' + name + '\n' +
      '主导色彩：' + d.name + '·' + d.type + '（' + d.en + '）\n\n' +
      '四项得分：\n' +
      '绿色（培养型）：' + g + '分\n' +
      '黄色（包融型）：' + y + '分\n' +
      '蓝色（展望型）：' + b + '分\n' +
      '橙色（指导型）：' + o + '分\n\n' +
      '基础维度：\n' +
      '情感(F)：' + F + ' | 逻辑(T)：' + T + '\n' +
      '直觉(N)：' + N + ' | 感觉(S)：' + S;
    fetch(FEISHU_WEBHOOK, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ msg_type: 'text', content: {text: feishuText} })
    }).then(function(res) {
      console.log('[4D测评] 飞书发送成功');
      submitStatus.textContent = statusText;
      submitStatus.style.color = '#2d9d5d';
    }).catch(function(err) {
      console.error('[4D测评] 飞书发送失败:', err);
      submitStatus.textContent = '保存失败，请复制下方结果手动发送';
      submitStatus.style.color = '#c45c5c';
    });
  }

  var ua = navigator.userAgent.toLowerCase();
  var isWechat = ua.indexOf('micromessenger') !== -1 || ua.indexOf('wxwork') !== -1 || typeof WeixinJSBridge !== 'undefined';

  if (isWechat) {
    sendFeishu('需手动导入', '已通知飞书备份');
  } else if (hasCF) {
    fetch(CF_API + '/api/submit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: name,
        F: F, N: N, T: T, S: S,
        scores: {green: g, yellow: y, blue: b, orange: o},
        mainColor: d.name + '·' + d.type,
        source: 'web',
        timestamp: new Date().toISOString()
      })
    }).then(function(res) { return res.json(); })
    .then(function(data) {
      if (data && data.success) {
        console.log('[4D测评] Cloudflare 保存成功');
        submitStatus.textContent = '结果已保存 ✓';
        submitStatus.style.color = '#2d9d5d';
        // Worker 已自动推送飞书 [已同步]，前端不再重复推送
      } else {
        console.error('[4D测评] Cloudflare 返回失败:', data);
        sendFeishu('需手动导入', '云端保存失败，已通知飞书备份');
      }
    }).catch(function(err) {
      console.error('[4D测评] Cloudflare 请求失败:', err);
      sendFeishu('需手动导入', '云端保存失败，已通知飞书备份');
    });
  } else {
    sendFeishu('', '已通知飞书备份');
  }

  document.getElementById('result').classList.add('show');
  document.getElementById('mainResult').appendChild(submitStatus);
  window.scrollTo({top:0,behavior:'smooth'});
}

function copyResult(){
  var rd=window._resultData, name=window._userName||'匿名';
  if(!rd){alert('请完成测评后再复制');return;}
  var d=rd.d;
  var text='【4D天性测评结果】\n姓名：'+name+
    '\n主导色彩：'+d.name+' · '+d.type+'（'+d.en+'）'+
    '\n\n四项得分：'+
    '\n绿色（培养型）：'+rd.g+'分'+
    '\n黄色（包融型）：'+rd.y+'分'+
    '\n蓝色（展望型）：'+rd.b+'分'+
    '\n橙色（指导型）：'+rd.o+'分'+
    '\n\n基础维度：'+
    '\n情感(F)：'+rd.F+'  |  逻辑(T)：'+rd.T+
    '\n直觉(N)：'+rd.N+'  |  感觉(S)：'+rd.S+
    '\n\n测评链接：https://avenli0106.github.io/4d-leadership/';
  var ok=function(msg){var el=document.createElement('div');el.textContent=msg;el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:#fff;padding:14px 28px;border-radius:10px;font-size:14px;z-index:9999;';document.body.appendChild(el);setTimeout(function(){if(el.parentNode)document.body.removeChild(el);},2000);};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ok('结果已复制到剪贴板');}).catch(function(){ok('复制失败，请手动截图');});
  }else{
    var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');ok('结果已复制到剪贴板');}catch(e){ok('复制失败，请手动截图');}
    document.body.removeChild(ta);
  }
}

renderQuestion();
</script>
</body>
</html>
