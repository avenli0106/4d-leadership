<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4D测评结果整理工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f7;color:#333;line-height:1.6;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{font-size:22px;margin-bottom:8px}
.guide{background:#e8f5ee;border-left:4px solid #2d9d5d;padding:14px 18px;border-radius:8px;margin-bottom:20px;font-size:14px;color:#1a5c36}
.guide code{background:rgba(0,0,0,0.06);padding:2px 6px;border-radius:4px;font-family:monospace}
textarea{width:100%;height:280px;padding:14px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;resize:vertical;outline:none;font-family:inherit;line-height:1.7}
textarea:focus{border-color:#2d9d5d}
.btn-row{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
button{padding:12px 24px;border:none;border-radius:10px;font-size:15px;cursor:pointer;transition:opacity 0.2s}
button.primary{background:#2d9d5d;color:#fff}
button.secondary{background:#e8e8ed;color:#333}
button:hover{opacity:0.9}
#preview{margin-top:20px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:10px;overflow:hidden}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #eee}
th{background:#f8f8fa;font-weight:600;color:#555;white-space:nowrap}
tr:hover{background:#f8f8fa}
.count{color:#888;font-size:13px;margin-top:12px}
.empty{color:#999;text-align:center;padding:40px 0}
</style>
</head>
<body>
<div class="container">
  <h1>4D天性测评结果整理工具</h1>
  <div class="guide">
    <b>使用方法：</b><br>
    1. 在飞书群里<b>批量复制</b>机器人发的测评消息<br>
    2. 粘贴到下方文本框（多条消息之间至少空一行）<br>
    3. 点击「解析」预览，确认无误后点击「下载 Excel」
  </div>

  <textarea id="inputArea" placeholder="把飞书群消息粘贴到这里...

示例格式：
【4D天性测评结果】
姓名：张三
主导色彩：绿色·培养型（Cultivating）

四项得分：
绿色（培养型）：7分
...

情感(F)：4 | 逻辑(T)：3
直觉(N)：4 | 感觉(S)：3"></textarea>

  <div class="btn-row">
    <button class="primary" onclick="parseAndPreview()">解析预览</button>
    <button class="secondary" onclick="downloadExcel()">下载 Excel</button>
    <button class="secondary" onclick="clearAll()">清空</button>
  </div>

  <div class="count" id="count"></div>
  <div id="preview"></div>
</div>

<script>
let parsedData = [];

function parseMessages(text) {
  const blocks = text.split(/\n{2,}/).map(b => b.trim()).filter(b => b.includes('【4D天性测评结果】'));
  const results = [];
  
  for (const block of blocks) {
    const result = {
      '提交时间': new Date().toLocaleString('zh-CN'),
      '用户名': '',
      '主导色彩': '',
      '情感F': '',
      '直觉N': '',
      '逻辑T': '',
      '感觉S': '',
      '绿色': '',
      '黄色': '',
      '蓝色': '',
      '橙色': ''
    };
    
    const nameMatch = block.match(/姓名：(.+)/);
    if (nameMatch) result['用户名'] = nameMatch[1].trim();
    
    const colorMatch = block.match(/主导色彩：(.+?)（/);
    if (colorMatch) result['主导色彩'] = colorMatch[1].trim();
    
    const greenMatch = block.match(/绿色（培养型）：(\d+)分/);
    if (greenMatch) result['绿色'] = parseInt(greenMatch[1]);
    
    const yellowMatch = block.match(/黄色（包融型）：(\d+)分/);
    if (yellowMatch) result['黄色'] = parseInt(yellowMatch[1]);
    
    const blueMatch = block.match(/蓝色（展望型）：(\d+)分/);
    if (blueMatch) result['蓝色'] = parseInt(blueMatch[1]);
    
    const orangeMatch = block.match(/橙色（指导型）：(\d+)分/);
    if (orangeMatch) result['橙色'] = parseInt(orangeMatch[1]);
    
    const dimMatch = block.match(/情感\(F\)：(\d+)\s*\|\s*逻辑\(T\)：(\d+)/);
    if (dimMatch) {
      result['情感F'] = parseInt(dimMatch[1]);
      result['逻辑T'] = parseInt(dimMatch[2]);
    }
    
    const dimMatch2 = block.match(/直觉\(N\)：(\d+)\s*\|\s*感觉\(S\)：(\d+)/);
    if (dimMatch2) {
      result['直觉N'] = parseInt(dimMatch2[1]);
      result['感觉S'] = parseInt(dimMatch2[2]);
    }
    
    if (result['用户名']) results.push(result);
  }
  
  return results;
}

function parseAndPreview() {
  const text = document.getElementById('inputArea').value;
  parsedData = parseMessages(text);
  
  const countEl = document.getElementById('count');
  const previewEl = document.getElementById('preview');
  
  if (parsedData.length === 0) {
    countEl.textContent = '未解析到任何测评结果，请检查消息格式';
    previewEl.innerHTML = '';
    return;
  }
  
  countEl.textContent = `共解析到 ${parsedData.length} 条测评结果`;
  
  const headers = Object.keys(parsedData[0]);
  let html = '<table><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
  
  for (const row of parsedData) {
    html += '<tr>' + headers.map(h => `<td>${row[h]}</td>`).join('') + '</tr>';
  }
  
  html += '</tbody></table>';
  previewEl.innerHTML = html;
}

function downloadExcel() {
  if (parsedData.length === 0) {
    alert('请先点击「解析预览」');
    return;
  }
  
  const headers = Object.keys(parsedData[0]);
  let csv = '\uFEFF' + headers.join('\t') + '\n'; // BOM + tab-separated
  
  for (const row of parsedData) {
    csv += headers.map(h => row[h]).join('\t') + '\n';
  }
  
  const blob = new Blob([csv], {type: 'application/vnd.ms-excel;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '4d_results_' + new Date().toISOString().slice(0,10) + '.xls';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function clearAll() {
  document.getElementById('inputArea').value = '';
  document.getElementById('preview').innerHTML = '';
  document.getElementById('count').textContent = '';
  parsedData = [];
}
</script>
</body>
</html>
